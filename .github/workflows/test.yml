name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions: read-all

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - advisories
          - bans sources
    # Prevent sudden announcement of a new advisory from failing ci:
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
      - name: Run linters
        run: ./bin/lint

  run-tests:
    name: Run tests
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - macos-15-intel # mac-x86
          - macos-latest # mac-arm
          - ubuntu-latest # linux-x86
          - ubuntu-24.04-arm # linux-arm

    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@nextest
      - name: Run non-TEE tests
        shell: bash
        run: ./bin/test

  build-projects:
    name: Build ${{ matrix.project }} with Kettle
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - burntsushi/ripgrep
          - eza-community/eza
          - openclaw/openclaw
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clone target project # Must match DIR in bin/kettle-build
        run: git clone "https://github.com/${{ matrix.project }}" "/tmp/$(basename "${{ matrix.project }}")"
      - name: Detect pnpm and node versions
        id: detect-versions
        run: |
          PKG="/tmp/$(basename "${{ matrix.project }}")/package.json"
          if [[ -f "$PKG" ]]; then
            PNPM_VERSION=$(jq -r '.packageManager // empty' "$PKG" | sed -n 's/^pnpm@//p')
            NODE_VERSION=$(jq -r '.engines.node // empty' "$PKG")
            echo "pnpm-version=$PNPM_VERSION" >> "$GITHUB_OUTPUT"
            echo "node-version=$NODE_VERSION" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pnpm
        if: steps.detect-versions.outputs.pnpm-version != ''
        uses: pnpm/action-setup@v4
        with:
          version: ${{ steps.detect-versions.outputs.pnpm-version }}
      - name: Setup Node.js
        if: steps.detect-versions.outputs.pnpm-version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.detect-versions.outputs.node-version }}
      - run: bin/kettle-build ${{ matrix.project }}
