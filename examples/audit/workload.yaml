name: "Security Audit"
description: "Run security analysis on built artifacts"

# Workload execution environment
environment:
  timeout_seconds: 300
  max_memory_mb: 2048
  network_access: true # Sandbox restriction

# Input validation - ensure we're running on expected build
inputs:
  expected_input_root: "sha256:1b2d157e33d46f4101069853d2d63a2ff6f48d3f9129a3758e8b002d33de02d9"

#Workload steps
steps:
  - name: "Run security scan"
    run: |
      cd "$BUILD_SOURCE"
      cargo-audit audit > ../audit_results.txt 2>&1

# What Party A sees (full results - captured stdout)
full_results:
  - path: "audit_results.txt"
    description: "Complete cargo-audit output"

# What Party B sees (result summary only)
result_summary:
  source: "audit_results.txt"
  type: "string"
